pre-commit:
  parallel: true
  commands:
    markdownlint:
      glob: "*.md"
      run: npx markdownlint-cli2 {staged_files}
      stage_fixed: true
    prettier:
      glob: "*.{md,json,yml,yaml}"
      run: npx prettier --write {staged_files}
      stage_fixed: true
    validate-manifests:
      glob: "{.claude-plugin/marketplace.json,plugins/*/.claude-plugin/plugin.json}"
      run: node ./scripts/validate-manifests.mjs

commit-msg:
  commands:
    commitlint:
      run: npx --no-install commitlint --edit {1}
    no-ai-attribution:
      run: |
        if grep -qE "(Generated with \[?Claude Code|Co-Authored-By: Claude|🤖 Generated)" {1}; then
          echo "[lefthook] commit message contains AI attribution — strip it before committing"
          exit 1
        fi
